---
name: Setup uv project
description: >-
  Check out the repository and install uv, ready to run project tooling
  (pytest, molecule, antsibull-changelog, ...).

inputs:
  python-version:
    description: Python version to install (empty = project default).
    required: false
    default: ""
  enable-cache:
    description: Enable the uv cache.
    required: false
    default: "true"
  fetch-depth:
    description: Number of commits to fetch (0 = full history).
    required: false
    default: "1"

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Install uv
      uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1
      with:
        enable-cache: ${{ inputs.enable-cache }}
        python-version: ${{ inputs.python-version }}
