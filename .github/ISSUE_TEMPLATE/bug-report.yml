---
name: Bug Report
description: Report a bug in an existing reusable workflow or composite action
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the details below to help us investigate.
        Before submitting, check the [documentation](https://projectpotos.github.io/actions/) and open issues to avoid duplicates.

  - type: dropdown
    id: workflow
    attributes:
      label: Affected Workflow or Action
      description: Which reusable workflow or composite action is affected?
      options:
        - release-ansible-collection.yaml
        - release-container.yaml
        - release-zensical.yaml
        - semantic-release.yaml
        - test-ansible-collection.yaml
        - test-lint.yaml
        - setup-uv
        - all-green
        - other / unsure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Workflow Version
      description: Which version tag are you using? (e.g. `v0.44.2`)
      placeholder: "v0.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages, logs, or a link to the failing workflow run.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Caller Workflow
      description: Paste the calling workflow YAML that reproduces the issue (replace secrets with placeholders).
      render: yaml

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, links to failed runs, or screenshots.

  - type: dropdown
    id: security-impact
    attributes:
      label: Security Impact
      description: Does this bug have a security dimension?
      options:
        - No security impact
        - Possible vulnerability or exposure (describe below)
        - Confirmed vulnerability — please also open a private Security Advisory
    validations:
      required: true

  - type: textarea
    id: security-detail
    attributes:
      label: Security Details (if applicable)
      description: |
        If this bug could be a security vulnerability, describe the potential impact.
        For confirmed vulnerabilities, open a
        [Security Advisory](https://github.com/projectpotos/actions/security/advisories/new)
        instead of, or in addition to, this issue.
