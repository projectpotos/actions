---
name: Release Ansible Collection

on:
  workflow_call:
    secrets:
      ANSIBLE_GALAXY_API_KEY:
        description: API key used to publish the collection on Ansible Galaxy.
        required: true

permissions: {}

jobs:
  release:
    name: Build and publish to Galaxy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: read # publishing needs no write access to the repository
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: false

      - name: Verify the tag matches the galaxy.yml version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GALAXY_VERSION="$(sed -nE 's/^version: *"?([0-9][^" ]*)"?.*/\1/p' galaxy.yml)"
          if [ "${TAG_VERSION}" != "${GALAXY_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match galaxy.yml version '${GALAXY_VERSION}'; merge the release PR before tagging" >&2
            exit 1
          fi
          NAMESPACE="$(sed -nE 's/^namespace: *"?([^" ]*)"?.*/\1/p' galaxy.yml)"
          NAME="$(sed -nE 's/^name: *"?([^" ]*)"?.*/\1/p' galaxy.yml)"
          echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact=${NAMESPACE}-${NAME}-${TAG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build the collection
        run: uv run --frozen ansible-galaxy collection build --force --output-path dist

      - name: Publish the collection on Galaxy
        env:
          ANSIBLE_GALAXY_API_KEY: ${{ secrets.ANSIBLE_GALAXY_API_KEY }}
        run: |
          [ -n "${ANSIBLE_GALAXY_API_KEY}" ] || {
            echo "::error::ANSIBLE_GALAXY_API_KEY is required to publish" >&2
            exit 1
          }
          TARBALL=$(ls -1 dist/*.tar.gz)
          uv run --frozen ansible-galaxy collection publish "${TARBALL}" \
            --api-key "${ANSIBLE_GALAXY_API_KEY}"

      - name: Upload built collection artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.version.outputs.artifact }}
          path: dist/*.tar.gz
          if-no-files-found: error
