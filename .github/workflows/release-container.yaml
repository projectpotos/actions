---
name: Release Container

on:
  workflow_call:
    inputs:
      tags:
        description: Tag specification for docker/metadata-action (multiline).
        type: string
        required: true
      labels:
        description: OCI labels for docker/metadata-action (multiline).
        type: string
        required: false
        default: ""
      platforms:
        description: Comma-separated target platforms.
        type: string
        required: false
        default: linux/amd64
      setup-qemu:
        description: Set up QEMU for cross-platform builds.
        type: boolean
        required: false
        default: false
      registry:
        description: Container registry to publish to.
        type: string
        required: false
        default: ghcr.io
      image-name:
        description: Image name (defaults to the calling repository).
        type: string
        required: false
        default: ""
      context:
        description: Context directory for the Docker build.
        type: string
        required: false
        default: "."
      dockerfile:
        description: Path to the Dockerfile (relative to the context).
        type: string
        required: false
        default: Dockerfile

permissions: {}

env:
  REGISTRY: ${{ inputs.registry }}
  IMAGE_NAME: ${{ inputs.image-name || github.repository }}

jobs:
  build:
    name: build & publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write # push the image to the registry (gated on non-PR events)
      id-token: write # keyless signing for the provenance attestation (gated on non-PR events)
      attestations: write # write the build-provenance attestation (gated on non-PR events)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU
        if: inputs.setup-qemu
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ inputs.tags }}
          labels: ${{ inputs.labels }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance is generated by the dedicated attestation step below.
          provenance: false

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
