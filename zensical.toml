[project]
site_name = "Potos GitHub Actions"
site_description = "Reusable GitHub Actions workflows and composite actions for Project Potos CI/CD"
site_author = "Project Potos"
site_url = "https://projectpotos.github.io/actions/"
repo_url = "https://github.com/projectpotos/actions"
copyright = "Copyright &copy; 2026 Project Potos."

# Potos theme: green primary, purple accent.
extra_css = ["stylesheets/extra.css"]

nav = [
    "index.md",
    "getting-started.md",
    { "Workflows" = [
        "workflows/index.md",
        { "Ansible Collections" = [
            "workflows/ansible/index.md",
            { "Test" = "workflows/ansible/test.md" },
            { "Release" = "workflows/ansible/release.md" },
        ] },
        { "Container Images" = [
            "workflows/container/index.md",
            { "Release" = "workflows/container/release.md" },
        ] },
        { "Lint" = "workflows/lint.md" },
        { "Zensical" = "workflows/zensical.md" },
        { "Semantic Release" = "workflows/semantic-release.md" },
    ] },
    { "Composite Actions" = [
        "actions/index.md",
        { "setup-uv" = "actions/setup-uv.md" },
        { "all-green" = "actions/all-green.md" },
    ] },
    { "Security" = [
        "security/index.md",
        { "Permissions" = "security/permissions.md" },
        { "Supply Chain" = "security/supply-chain.md" },
    ] },
    "contributing.md",
    { "Workflow Analysis" = "analysis.md" },
]

# ----------------------------------------------------------------------------
# Theme (kept in sync with the potos docs repo)
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

# Light/dark mode toggle.
[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# Markdown extensions (kept in sync with the potos docs repo)
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
